services:
  - type: web
    name: news-ingestion-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NEWS_API_HOST
        value: 0.0.0.0
      - key: NEWS_REFRESH_INTERVAL_SECONDS
        value: "10"
      - key: NEWS_API_CORS_ORIGIN
        value: "*"
      - key: NEWS_API_TOKEN
        generateValue: true
    disk:
      name: news-ingestion-data
      mountPath: /app/data
      sizeGB: 1
