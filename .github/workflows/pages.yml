name: Build GitHub Pages Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore persisted news data
        run: |
          mkdir -p data
          if [ -d seed-data/daily ]; then
            rm -rf data/daily
            cp -R seed-data/daily data/daily
          fi
      - name: Collect latest news
        run: PYTHONPATH=src python -m news_ingestion.cli daily --analyze
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Export static dashboard
        run: PYTHONPATH=src python -m news_ingestion.static_export --out-dir public --max-dates 10
      - name: Persist updated news data
        if: github.event_name != 'push'
        run: |
          rm -rf seed-data/daily
          mkdir -p seed-data
          cp -R data/daily seed-data/daily
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seed-data/daily
          if ! git diff --cached --quiet; then
            git commit -m "Update persisted news data [skip ci]"
            git push
          else
            echo "No persisted data changes."
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
